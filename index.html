<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://3r5j07xgp9khz.space.minimax.io">
<title>AI Intel Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-1: #161b22;
    --border: #30363d;
    --text: #f0f6fc;
    --text-2: #8b949e;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 48px;
    max-width: 540px;
    text-align: center;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p { color: var(--text-2); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  a {
    color: var(--accent);
    text-decoration: none;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    word-break: break-all;
  }
  a:hover { text-decoration: underline; }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <h1>AI Intel Dashboard</h1>
    <p>Redirecting to the latest version&hellip;</p>
    <p><span class="spinner"></span><a href="https://3r5j07xgp9khz.space.minimax.io">https://3r5j07xgp9khz.space.minimax.io</a></p>
  </div>
</body>
</html>
